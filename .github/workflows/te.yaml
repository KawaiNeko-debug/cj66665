- name: 调试：检测环境变量注入情况
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          PASSPORT_URL: ${{ secrets.PASSPORT_URL }}
          REFERER: ${{ secrets.REFERER }}
          SLIDER_ID: ${{ secrets.SLIDER_ID }}
          WRAPPER_ID: ${{ secrets.WRAPPER_ID }}
          HEADER_CLIENT_TYPE: ${{ secrets.HEADER_CLIENT_TYPE }}
          HEADER_ACCESS_TOKEN: ${{ secrets.HEADER_ACCESS_TOKEN }}
          TOKEN_KEY: ${{ secrets.TOKEN_KEY }}
        run: |
          echo "=== 环境变量状态检查 ==="
          [ -z "$BASE_URL" ] && echo "缺失: BASE_URL" || echo "OK: BASE_URL"
          [ -z "$PASSPORT_URL" ] && echo "缺失: PASSPORT_URL" || echo "OK: PASSPORT_URL"
          [ -z "$REFERER" ] && echo "缺失: REFERER" || echo "OK: REFERER"
          [ -z "$SLIDER_ID" ] && echo "缺失: SLIDER_ID" || echo "OK: SLIDER_ID"
          [ -z "$WRAPPER_ID" ] && echo "缺失: WRAPPER_ID" || echo "OK: WRAPPER_ID"
          [ -z "$HEADER_CLIENT_TYPE" ] && echo "缺失: HEADER_CLIENT_TYPE" || echo "OK: HEADER_CLIENT_TYPE"
          [ -z "$HEADER_ACCESS_TOKEN" ] && echo "缺失: HEADER_ACCESS_TOKEN" || echo "OK: HEADER_ACCESS_TOKEN"
          [ -z "$TOKEN_KEY" ] && echo "缺失: TOKEN_KEY" || echo "OK: TOKEN_KEY"
          echo "========================"
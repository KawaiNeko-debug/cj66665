name: sign-batch3

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

env:
  TZ: Asia/Shanghai

permissions:
  contents: read
  actions: read

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
    steps:
      - id: matrix
        shell: bash
        env:
          ACCOUNTS: ${{ secrets.ACCOUNTS_BATCH3 }}
        run: |
          python - <<'PY'
          import json, os, random
          lines = [line.strip() for line in os.environ['ACCOUNTS'].splitlines() if line.strip()]
          if not lines:
              raise SystemExit('accounts is empty')
          items = [{"account_index": idx} for idx in range(1, len(lines) + 1)]
          seed = os.getenv('SIGN_RANDOM_SEED', '')
          rng = random.Random(seed) if seed else random.Random()
          rng.shuffle(items)
          for order, item in enumerate(items, start=1):
              item['execution_order'] = order
          matrix = {"include": items}
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"matrix={json.dumps(matrix, ensure_ascii=False)}\n")
              f.write(f"count={len(lines)}\n")
          PY

  run:
    needs: prepare
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      PASSPORT_URL: ${{ secrets.PASSPORT_URL }}
      REFERER: ${{ secrets.REFERER }}
      SLIDER_ID: ${{ secrets.SLIDER_ID }}
      WRAPPER_ID: ${{ secrets.WRAPPER_ID }}
      HEADER_CLIENT_TYPE: ${{ secrets.HEADER_CLIENT_TYPE }}
      HEADER_ACCESS_TOKEN: ${{ secrets.HEADER_ACCESS_TOKEN }}
      HEADER_ACCESS_TOKEN_FALLBACKS: ${{ secrets.HEADER_ACCESS_TOKEN_FALLBACKS }}
      HEADER_SECRET_KEY: ${{ secrets.HEADER_SECRET_KEY }}
      TOKEN_KEY: ${{ secrets.TOKEN_KEY }}
      TOKEN_ALTERNATIVE_KEYS: ${{ secrets.TOKEN_ALTERNATIVE_KEYS }}
      API_SIGN_PATH: ${{ secrets.API_SIGN_PATH }}
      GROUP_NAME: batch3
      GROUP_NUMBER: "3"
      ACCOUNT_INDEX: ${{ matrix.account_index }}
      EXECUTION_ORDER: ${{ matrix.execution_order }}
      ACCOUNTS: ${{ secrets.ACCOUNTS_BATCH3 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r h3/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Wait for pause window
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python h3/run_artifacts.py wait

      - name: Select account
        shell: bash
        run: |
          python - <<'PY'
          import os
          lines = [line.strip() for line in os.environ['ACCOUNTS'].splitlines() if line.strip()]
          idx = int(os.environ['ACCOUNT_INDEX'])
          if idx < 1 or idx > len(lines):
              raise SystemExit(f'Index {idx} out of range 1..{len(lines)}')
          username, password = lines[idx - 1].split(',', 1)
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f'ACCOUNT_USERNAME={username}\n')
              f.write(f'ACCOUNT_PASSWORD={password}\n')
          PY

      - name: Sign in
        env:
          RESULT_JSON_PATH: result.json
        run: |
          python h3/script.py "$ACCOUNT_USERNAME" "$ACCOUNT_PASSWORD" "false"

      - name: Ensure result file
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime
          path = 'result.json'
          if os.path.exists(path):
              raise SystemExit(0)
          account_index = int(os.getenv('ACCOUNT_INDEX', '0') or 0)
          execution_order = int(os.getenv('EXECUTION_ORDER', '0') or 0)
          group_number = int(os.getenv('GROUP_NUMBER', '0') or 0)
          payload = {
              'generated_at': datetime.now().isoformat(),
              'batch_name': os.getenv('GROUP_NAME', ''),
              'group_name': os.getenv('GROUP_NAME', ''),
              'group_number': group_number,
              'total_accounts': 1,
              'results': [{
                  'account_index': account_index,
                  'execution_order': execution_order,
                  'group_name': os.getenv('GROUP_NAME', ''),
                  'group_number': group_number,
                  'group_position': '',
                  'sign_success': False,
                  'sign_status': 'error',
                  'initial_points': 0.0,
                  'final_points': 0.0,
                  'points_reward': 0.0,
                  'has_reward': False,
                  'password_error': False,
                  'risk_controlled': False,
                  'retry_count': 0,
                  'is_final_retry': False,
                  'detail_reason': 'result.json missing',
              }],
          }
          with open(path, 'w', encoding='utf-8') as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          PY

      - name: Plan pause signal
        id: pause_plan
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python h3/run_artifacts.py plan-pause result.json

      - name: Create pause file
        if: always() && steps.pause_plan.outputs.should_upload == 'true'
        shell: bash
        run: |
          printf '%s' '${{ steps.pause_plan.outputs.pause_until }}' > pause-signal.txt

      - name: Upload pause signal
        if: always() && steps.pause_plan.outputs.should_upload == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pause_plan.outputs.artifact_name }}
          path: pause-signal.txt
          if-no-files-found: error
          retention-days: 1

      - name: Upload initial result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: initial-result-${{ matrix.account_index }}
          path: result.json
          if-no-files-found: error
          retention-days: 2

  prepare_retry:
    needs: [prepare, run]
    if: always()
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.retry_matrix.outputs.matrix }}
      has_failed: ${{ steps.retry_matrix.outputs.has_failed }}
    steps:
      - name: Download initial results
        uses: actions/download-artifact@v4
        with:
          pattern: initial-result-*
          path: initial-results

      - id: retry_matrix
        shell: bash
        run: |
          python - <<'PY'
          import glob, json, os
          failed = []
          for path in glob.glob('initial-results/**/result.json', recursive=True):
              with open(path, 'r', encoding='utf-8') as f:
                  payload = json.load(f)
              rows = payload.get('results') or []
              row = rows[0] if rows else {}
              if row and not row.get('sign_success'):
                  failed.append({'account_index': int(row.get('account_index', 0))})
          failed.sort(key=lambda item: item['account_index'])
          matrix = {'include': failed}
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"matrix={json.dumps(matrix, ensure_ascii=False)}\n")
              f.write(f"has_failed={'true' if failed else 'false'}\n")
          PY

  retry:
    needs: [prepare, prepare_retry]
    if: always() && needs.prepare_retry.outputs.has_failed == 'true'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJSON(needs.prepare_retry.outputs.matrix) }}
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      PASSPORT_URL: ${{ secrets.PASSPORT_URL }}
      REFERER: ${{ secrets.REFERER }}
      SLIDER_ID: ${{ secrets.SLIDER_ID }}
      WRAPPER_ID: ${{ secrets.WRAPPER_ID }}
      HEADER_CLIENT_TYPE: ${{ secrets.HEADER_CLIENT_TYPE }}
      HEADER_ACCESS_TOKEN: ${{ secrets.HEADER_ACCESS_TOKEN }}
      HEADER_ACCESS_TOKEN_FALLBACKS: ${{ secrets.HEADER_ACCESS_TOKEN_FALLBACKS }}
      HEADER_SECRET_KEY: ${{ secrets.HEADER_SECRET_KEY }}
      TOKEN_KEY: ${{ secrets.TOKEN_KEY }}
      TOKEN_ALTERNATIVE_KEYS: ${{ secrets.TOKEN_ALTERNATIVE_KEYS }}
      API_SIGN_PATH: ${{ secrets.API_SIGN_PATH }}
      GROUP_NAME: batch3
      GROUP_NUMBER: "3"
      ACCOUNT_INDEX: ${{ matrix.account_index }}
      EXECUTION_ORDER: ${{ matrix.account_index }}
      ACCOUNTS: ${{ secrets.ACCOUNTS_BATCH3 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r h3/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Select account
        shell: bash
        run: |
          python - <<'PY'
          import os
          lines = [line.strip() for line in os.environ['ACCOUNTS'].splitlines() if line.strip()]
          idx = int(os.environ['ACCOUNT_INDEX'])
          if idx < 1 or idx > len(lines):
              raise SystemExit(f'Index {idx} out of range 1..{len(lines)}')
          username, password = lines[idx - 1].split(',', 1)
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f'ACCOUNT_USERNAME={username}\n')
              f.write(f'ACCOUNT_PASSWORD={password}\n')
          PY

      - name: Retry sign in on fresh runner
        env:
          RESULT_JSON_PATH: result.json
        run: |
          python h3/script.py "$ACCOUNT_USERNAME" "$ACCOUNT_PASSWORD" "false"

      - name: Ensure result file
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime
          path = 'result.json'
          if os.path.exists(path):
              raise SystemExit(0)
          account_index = int(os.getenv('ACCOUNT_INDEX', '0') or 0)
          group_number = int(os.getenv('GROUP_NUMBER', '0') or 0)
          payload = {
              'generated_at': datetime.now().isoformat(),
              'batch_name': os.getenv('GROUP_NAME', ''),
              'group_name': os.getenv('GROUP_NAME', ''),
              'group_number': group_number,
              'total_accounts': 1,
              'results': [{
                  'account_index': account_index,
                  'execution_order': account_index,
                  'group_name': os.getenv('GROUP_NAME', ''),
                  'group_number': group_number,
                  'group_position': '',
                  'sign_success': False,
                  'sign_status': 'error',
                  'initial_points': 0.0,
                  'final_points': 0.0,
                  'points_reward': 0.0,
                  'has_reward': False,
                  'password_error': False,
                  'risk_controlled': False,
                  'retry_count': 0,
                  'is_final_retry': True,
                  'detail_reason': 'retry result.json missing',
              }],
          }
          with open(path, 'w', encoding='utf-8') as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          PY

      - name: Upload retry result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retry-result-${{ matrix.account_index }}
          path: result.json
          if-no-files-found: error
          retention-days: 2

  finalize:
    needs: [prepare, run, prepare_retry, retry]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download initial results
        uses: actions/download-artifact@v4
        with:
          pattern: initial-result-*
          path: artifacts

      - name: Download retry results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: retry-result-*
          path: artifacts

      - name: Merge final results
        run: |
          python h3/merge_results.py artifacts merged/result.json

      - name: Upload final batch artifact
        uses: actions/upload-artifact@v4
        with:
          name: batch3-result
          path: merged/result.json
          if-no-files-found: error
          retention-days: 2

name: cj

on:
  # 现在只能在 GitHub 网页端手动点击运行了
  workflow_dispatch:

jobs:
  # =========================================================
  # 任务1：矩阵分配，为每个账号生成一台独立服务器
  # =========================================================
  lottery-matrix:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix:
        account_index: [1, 2, 3, 4, 5, 6]

    steps:
      - name: 检查代码仓库
        uses: actions/checkout@v4  # ✅ 已升级到 v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5  # ✅ 已升级到 v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f h3/requirements.txt ]; then pip install -r h3/requirements.txt; fi
          pip install playwright requests fake-useragent

      - name: 安装 Playwright 浏览器内核 (独立环境必需)
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: 提取对应账号并执行抽奖
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          PASSPORT_URL: ${{ secrets.PASSPORT_URL }}
          REFERER: ${{ secrets.REFERER }}
          ACCOUNTS: ${{ secrets.ACCOUNTS }}
          BANNED_ACCOUNTS: ${{ secrets.BANNED_ACCOUNTS }}
          
          LOTTERY_ACTIVITY_CODE: "LAKU"
          LOTTERY_MAX_DRAWS: "3"
          LOTTERY_EXCHANGE_MAX_ATTEMPTS: "3"
          LOTTERY_SIGNUP_DELAY_MIN: "3"
          LOTTERY_SIGNUP_DELAY_MAX: "5"
          LOTTERY_EXCHANGE_DELAY_MIN: "3"
          LOTTERY_EXCHANGE_DELAY_MAX: "5"
          LOTTERY_DRAW_DELAY_MIN: "5"
          LOTTERY_DRAW_DELAY_MAX: "8"
          
          ACCOUNT_INDEX: ${{ matrix.account_index }}
          RESULT_JSON_PATH: result-${{ matrix.account_index }}.json
        run: |
          echo "$ACCOUNTS" > accounts.txt
          ACCOUNT_LINE=$(sed '/^$/d' accounts.txt | sed -n "${ACCOUNT_INDEX}p")
          
          if [ -z "$ACCOUNT_LINE" ]; then
            echo "未找到序号为 ${ACCOUNT_INDEX} 的账号，自动跳过该机器。"
            exit 0
          fi
          
          USERNAME=$(echo "$ACCOUNT_LINE" | cut -d',' -f1 | xargs)
          PASSWORD=$(echo "$ACCOUNT_LINE" | cut -d',' -f2 | xargs)
          
          echo "🚀 这台独立机器分配到的账号序号: ${ACCOUNT_INDEX}"
          
          python h3/script.py "$USERNAME" "$PASSWORD" "false"

      - name: 上传该机器的抽奖结果记录
        uses: actions/upload-artifact@v4  # ✅ 已升级到 v4
        if: always()
        with:
          name: result-${{ matrix.account_index }}
          path: result-${{ matrix.account_index }}.json
          retention-days: 1

  # =========================================================
  # 任务2：等待所有机器跑完后，把结果汇总并生成报表
  # =========================================================
  summary-report:
    needs: lottery-matrix
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 检查代码仓库
        uses: actions/checkout@v4  # ✅ 已升级到 v4
        
      - name: 设置 Python 环境
        uses: actions/setup-python@v5  # ✅ 已升级到 v5
        with:
          python-version: '3.11'
          
      - name: 下载所有独立机器产生的结果文件
        uses: actions/download-artifact@v4  # ✅ 已升级到 v4
        with:
          path: downloaded_results

      - name: 执行合并脚本
        run: |
          pip install pandas openpyxl
          if [ -f h3/merge_results.py ]; then
            python h3/merge_results.py
          fi
          
      - name: 上传最终的 Excel 总表
        uses: actions/upload-artifact@v4  # ✅ 已升级到 v4
        if: always()
        with:
          name: Final-Lottery-Report
          path: "*.xlsx"
          retention-days: 7